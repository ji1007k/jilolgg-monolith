name: "[CI] Main Image Build & Push"

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  image-release:
    name: "[CI] Build Docker Image & Push GHCR"
    runs-on: ubuntu-22.04

    steps:
      - name: "[1] 저장소 코드 다운로드 (Checkout)"
        uses: actions/checkout@v4

      - name: "[2] Docker Buildx 설정"
        uses: docker/setup-buildx-action@v3

      - name: "[3] GitHub Container Registry(GHCR) 로그인"
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: "[4] 이미지 태그 환경 변수 설정"
        run: |
          echo "REPO_URL=ghcr.io/${{ github.repository }}" >> $GITHUB_ENV
          echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: "[5] 모놀리식 이미지 빌드"
        run: |
          docker build \
            -t "$REPO_URL:latest" \
            -t "$REPO_URL:$IMAGE_TAG" \
            .

      - name: "[6] GHCR 푸시"
        run: |
          docker push "$REPO_URL:latest"
          docker push "$REPO_URL:$IMAGE_TAG"
