name: OIDC Test via SSM

on:
  pull_request:
    branches: [ main ]
    types:
      - opened

env:
  AWS_ROLE_ARN: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-deploy-role

jobs:
  oidc-test:
    runs-on: ubuntu-latest

    permissions:
      id-token: write     # OIDC 인증을 위한 필수
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set GHCR Repo URL
        run: echo "REPO_URL=ghcr.io/${{ github.repository }}" >> $GITHUB_ENV

      - name: Show GitHub OIDC Token Claims
        run: |
          curl -sLS -o /tmp/token.json "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com" -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN"
          cat /tmp/token.json | jq

      - name: Debug GitHub Context
        run: |
          echo "REPO: $GITHUB_REPOSITORY"
          echo "REF: $GITHUB_REF_NAME"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Verify Caller Identity (DEBUG)
        run: aws sts get-caller-identity

      - name: Deploy via SSM
        run: |
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --instance-ids ${{ secrets.AWS_SSM_INSTANCE_ID }} \
            --parameters commands=["echo '✅ OIDC 배포 성공!'"] \
            --region ${{ secrets.AWS_REGION }}
