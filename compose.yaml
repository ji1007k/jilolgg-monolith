# 공통 설정

services:
  # Application
  my_be:   # 서비스명 지정 가능
    container_name: basic-be  # 컨테이너 이름 지정
    build:
      context: .
      dockerfile: Dockerfile
    #image: ${REPO_URL}:latest
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      # 1) 로컬 DB (리눅스 운영체제). ec2의 경우 ip 고정 아니라 변경되면 바꿔야함
      SPRING_DATASOURCE_URL: jdbc:postgresql://db-postgresql.ctqgk0k2w472.ap-northeast-2.rds.amazonaws.com:5432/basic
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres250425
      TZ: Asia/Seoul
    volumes:
      # 해당 경로 존재여부 및 권한 확인 필
      - /var/log/myapp/be:/app/logs

# 마운트 대상 호스트 디렉토리 미리 생성
#  sudo mkdir -p /var/log/myapp/be
#  sudo chown 10001:10001 /var/log/myapp/be   # 컨테이너에서 사용하는 UID/GID에 맞춰서
#  sudo chmod 755 /var/log/myapp/be
