name: "[CD] Deploy BasicBE SpringBoot via SSM & Rollback"

on:
  push:
    branches:
      - main    # main 브랜치에 푸시될 때마다 실행됨

permissions:
  id-token: write   # OIDC 인증을 위해 필요
  contents: read    # 레포 접근 위해 필요

jobs:
  deployBasicBeSpringBoot:
    runs-on: ubuntu-latest

    steps:
      - name: "[1] Checkout repository"
        uses: actions/checkout@v4

      - name: "[2] Configure AWS credentials"
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_DEPLOY_ROLE }}
          role-session-name: GitHubActionsDeploy
          aws-region: ${{ secrets.AWS_REGION }}

      - name: "[3] Log in to GitHub Container Registry"
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      # 컨테이너 --memory는 최소 -Xmx의 1.5배 이상 잡아야 안정적

      - name: "[4] Create deployment script inline"
        run: |
          REPO_URL="ghcr.io/${{ github.repository }}"
          
          # 멀티라인 스크립트를 변수로 생성
          DEPLOY_SCRIPT=$(cat << 'SCRIPT_EOF'
          #!/bin/bash
          set -e
          
          echo "=========================================="
          echo "Spring Boot 배포 시작"
          echo "Repository: $REPO_URL"
          echo "=========================================="
          
          # 로그 디렉토리 준비
          echo "로그 디렉토리 준비..."
          sudo mkdir -p /var/log/myapp/be
          sudo chown 10001:10001 /var/log/myapp/be
          
          # GHCR 로그인
          echo "GitHub Container Registry 로그인..."
          echo "$GHCR_PAT" | sudo docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
          
          # 최신 이미지 다운로드
          echo "최신 이미지 다운로드..."
          sudo docker pull "$REPO_URL:latest"
          
          # 현재 이미지 백업
          echo "현재 이미지 백업..."
          # 컨테이너 존재 여부 확인
          if sudo docker ps -a --format '{{.Names}}' | grep -wq "basic-be"; then
            echo "컨테이너 basic-be 존재. 이미지 백업 시도..."
            BACKUP_IMAGE=$(sudo docker inspect basic-be --format='{{.Config.Image}}' 2>/dev/null || echo "<inspect 실패>")
          else
            echo "basic-be 컨테이너 없음. 백업 생략"
            BACKUP_IMAGE="<없음>"
          fi
          
          # 로그가 너무 길어지지 않도록 echo는 제한
          echo "백업된 이미지: ${BACKUP_IMAGE:0:80}..."
          
          # 새 버전 배포
          echo "새 버전 배포..."
          sudo docker stop basic-be || true
          sudo docker rm basic-be || true
          sudo docker run -d --restart=unless-stopped \
              --memory=448m --memory-swap=576m \
              -v /var/log/myapp/be:/app/logs \
              --name basic-be \
              -p 8080:8080 "$REPO_URL:latest"
          
          # 애플리케이션 시작 대기
          echo "애플리케이션 시작 대기 (30초)..."
          sleep 30
          
          # Health Check
          echo "Health Check 시작..."
          HEALTH_CHECK_PASSED=false
          
          for i in {1..6}; do
              echo "Health Check 시도 $i/6..."
              if curl -f http://localhost/jikimi/api/actuator/health --connect-timeout 10 --max-time 15; then
                  echo "Health Check 성공!"
                  HEALTH_CHECK_PASSED=true
                  break
              else
                  echo "Health Check 실패, 10초 후 재시도..."
                  sleep 10
              fi
          done
          
          # 롤백 처리
          if [ "$HEALTH_CHECK_PASSED" = "false" ]; then
              echo "Health Check 실패! 롤백 시작..."
              sudo docker stop basic-be || true
              sudo docker rm basic-be || true
          
              if [ -n "$BACKUP_IMAGE" ] && [ "$BACKUP_IMAGE" != "$REPO_URL:latest" ]; then
                  echo "<< 이전 버전으로 롤백: $BACKUP_IMAGE"
                  sudo docker run -d --restart=unless-stopped \
                      --memory=448m --memory-swap=576m \
                      -v /var/log/myapp/be:/app/logs \
                      --name basic-be \
                      -p 8080:8080 "$BACKUP_IMAGE"
                  echo "롤백 완료"
              else
                  echo "백업 이미지 없음"
              fi
          
              sudo docker ps
              exit 1
          else
              echo "배포 성공!"
          fi
          
          echo "최종 상태:"
          sudo docker ps
          echo "=========================================="
          SCRIPT_EOF
          )
          
          # Base64 인코딩으로 특수문자 문제 해결
          ENCODED_SCRIPT=$(echo "$DEPLOY_SCRIPT" | base64 -w 0)
          
          COMMANDS="[ \
            \"echo '$ENCODED_SCRIPT' | base64 -d > /tmp/deploy.sh\", \
            \"chmod +x /tmp/deploy.sh\", \
            \"REPO_URL='$REPO_URL' GHCR_PAT='${{ secrets.GHCR_PAT }}' GITHUB_ACTOR='${{ github.actor }}' /tmp/deploy.sh\" \
          ]"

          echo "배포 실행..."

          CMD_ID=$(aws ssm send-command \
            --region ${{ secrets.AWS_REGION }} \
            --document-name "AWS-RunShellScript" \
            --instance-ids ${{ secrets.AWS_SSM_INSTANCE_ID }} \
            --comment "Deploy SpringBoot app via inline script" \
            --parameters commands="$COMMANDS" \
            --timeout-seconds="600" \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $CMD_ID"

          # 배포 결과 대기 (최대 10분)
          for i in {1..24}; do
            STATUS=$(aws ssm list-command-invocations \
              --region ${{ secrets.AWS_REGION }} \
              --command-id $CMD_ID \
              --details \
              --query "CommandInvocations[0].Status" \
              --output text)

            echo "Status: $STATUS (${i}/24)"

            if [ "$STATUS" = "Success" ] || [ "$STATUS" = "Failed" ]; then
              break
            fi
            sleep 5
          done

          echo "Command Output:"
          aws ssm list-command-invocations \
            --region ${{ secrets.AWS_REGION }} \
            --command-id $CMD_ID \
            --details \
            --output json | jq

      - name: "[5] Post-deployment verification"
        if: success()
        run: |
          echo "배포 완료!"
          echo "서비스 URL: https://ec2-54-180-118-74.ap-northeast-2.compute.amazonaws.com/jikimi"