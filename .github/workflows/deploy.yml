name: CI/CD with GHCR

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        with:
          version: latest  # 최신 버전으로 설정

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Set environment variable for repository owner
        run: echo "REPO_OWNER=${{ github.repository_owner }}" >> $GITHUB_ENV

      - name: Build and push Docker image using Docker Compose
        run: |
          # Docker Compose를 사용하여 빌드 및 푸시
          docker compose -f compose.yaml build
          docker compose -f compose.yaml push

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: SSH into server and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 배포 서버에서 기존 앱 컨테이너 종료 및 삭제
            docker compose -f /home/app/baisic/compose.yaml down || true

            # 최신 이미지를 pull
            docker compose -f /home/app/baisic/compose.yaml pull

            # /home/app/ 경로에 배포하고 8080 포트로 실행
            docker compose -f /home/app/baisic/compose.yaml up -d
            
            # 배포 후 상태 확인 (컨테이너 상태 확인)
            docker ps

            # 애플리케이션이 올바르게 실행되고 있는지 확인
            curl -f http://localhost:8080 || exit 1  # 앱이 8080 포트에서 정상적으로 응답하는지
