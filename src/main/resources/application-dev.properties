# Database (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/basic
spring.datasource.username=jikim
spring.datasource.password=jikim
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Spring Boot SQL 설정
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:/db/postgres/schema.sql  
spring.sql.init.data-locations=classpath:/db/postgres/data.sql

# SQL 출력 설정
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Swagger UI 설정
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/api/swagger-ui
springdoc.api-docs.path=/api/v3/api-docs
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true

# Redis 설정
spring.data.redis.host=3.36.70.95
spring.data.redis.port=6379
spring.data.redis.password=admin
spring.data.redis.timeout=2000
