name: "[CI] Deploy BasicBE SpringBoot via SSM"

on:
  push:
    branches:
      - main

permissions:
  id-token: write   # OIDC를 위해 필수
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ROLE_TO_ASSUME: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/ec2-ssm-role

jobs:
  deployBasicBeSpringBoot:
    name: "[CI] Deploy Basic BE SpringBoot to AWS EC2"
    runs-on: ubuntu-latest

    steps:
      - name: "[1] Checkout repository"
        uses: actions/checkout@v4

      - name: "[2] Set up Docker Buildx"
        uses: docker/setup-buildx-action@v2

      - name: "[3] Login to GitHub Container Registry"
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: "[4] Set repository variable"
        run: echo "REPO_URL=ghcr.io/${{ github.repository }}" >> $GITHUB_ENV

      - name: "[5] Configure AWS credentials via OIDC"
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ env.ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: "[6] Deploy to EC2 via SSM"
        run: |
          REPO_URL="ghcr.io/${{ github.repository }}"

          COMMANDS="[ 
            \"echo '${{ secrets.GHCR_PAT }}' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin\",
            \"docker pull $REPO_URL:latest\",
            \"docker stop basic-be || true\",
            \"docker rm basic-be || true\",
            \"docker run -d --name basic-be -p 8080:8080 $REPO_URL:latest\",
            \"docker ps\" 
          ]"

          CMD_ID=$(aws ssm send-command \
            --region ${{ env.AWS_REGION }} \
            --document-name "AWS-RunShellScript" \
            --instance-ids ${{ secrets.AWS_SSM_INSTANCE_ID }} \
            --comment "Deploy SpringBoot app via SSM" \
            --parameters commands="$COMMANDS" \
            --query "Command.CommandId" \
            --output text)

          echo "SSM command sent. CommandId: $CMD_ID"

          for i in {1..12}; do
            STATUS=$(aws ssm list-command-invocations \
              --region ${{ env.AWS_REGION }} \
              --command-id $CMD_ID \
              --details \
              --query "CommandInvocations[0].Status" \
              --output text)

            echo "Current SSM command status: $STATUS"

            if [ "$STATUS" == "Success" ] || [ "$STATUS" == "Failed" ]; then
              break
            fi
            sleep 5
          done

          aws ssm list-command-invocations \
            --region ${{ env.AWS_REGION }} \
            --command-id $CMD_ID \
            --details \
            --query "CommandInvocations[0].CommandPlugins[0].Output" \
            --output text
