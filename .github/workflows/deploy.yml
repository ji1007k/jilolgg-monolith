name: CI/CD with GHCR

on:
  push:
    branches:
      - main    # main 브랜치에 푸시될 때마다 실행됨

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        with:
          version: latest  # 최신 버전으로 설정

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Set repository variable
        run: echo "REPO_URL=ghcr.io/${{ github.repository }}" >> $GITHUB_ENV  # 환경 변수 설정

      - name: Build and push Docker image using Docker Compose
        run: |
#           Docker Compose를 사용하여 빌드 및 푸시
          docker build -t $REPO_URL:latest .  # GHCR에 태그 붙여서 빌드
          docker push $REPO_URL:latest  # 이미지를 GHCR로 푸시

  deploy:
    needs: build  # build 작업이 끝나야 deploy 작업이 시작됨
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set repository variable
        run: echo "REPO_URL=ghcr.io/${{ github.repository }}" >> $GITHUB_ENV  # 환경 변수 설정

      - name: SSH into server and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
#            배포 서버에서 기존 앱 컨테이너 종료 및 삭제
            docker compose -f /home/ubuntu/app/baisic/compose.yaml down || true

#            최신 이미지 pull
#             - 방법1) GHCR에서 풀
            docker pull $REPO_URL:latest
#            - 방법2) Docker Compose yaml 파일에 지정된 image 를 기반으로 다운로드
#            Docker Compose는 이미지 URL을 명시적으로 지정 불가
#            docker compose -f /home/ubuntu/app/baisic/compose.yaml pull

            # /home/app/ 경로에 배포하고 8080 포트로 실행
            docker compose -f /home/ubuntu/app/baisic/compose.yaml up -d
            
            # 배포 후 상태 확인 (컨테이너 상태 확인)
            docker ps

            # 애플리케이션이 올바르게 실행되고 있는지 확인
            #curl -f http://localhost:8080 || exit 1  # 앱이 8080 포트에서 정상적으로 응답하는지
