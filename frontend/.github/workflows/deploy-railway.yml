name: "[CD] Deploy JILoL.gg Next.js to Railway"

on:
  push:
    branches:
      - main    # main 브랜치에 푸시될 때마다 실행됨

jobs:
  deployBasicFeNextjs:
    runs-on: ubuntu-latest

    steps:
      # [1] Railway CLI 설치
      - name: Install Railway CLI
        run: npm install -g @railway/cli

      # [2] CLI를 이용한 배포 트리거
      - name: Trigger Railway Redeploy
        run: |
          railway redeploy \
            --service "${{ secrets.RAILWAY_SERVICE_ID }}" \
            -y
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_PROJECT_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_ENVIRONMENT_ID: ${{ secrets.RAILWAY_ENV_ID }}

