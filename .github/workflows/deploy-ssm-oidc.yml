name: "[CI] Deploy BasicBE SpringBoot via SSM"

on:
  pull_request:
    branches:
      - main  # 'main' 브랜치에 생긴 PR에 대해서 실행
    types:
      - opened  # PR이 처음 열릴 때만 실행

jobs:
  deployBasicBeSpringBoot:
    runs-on: ubuntu-latest

    steps:
      - name: "[1] Checkout repository"
        uses: actions/checkout@v4

      - name: "[2] Configure AWS credentials"
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/ec2-ssm-role
          role-session-name: GitHubActionsDeploy
          aws-region: ${{ secrets.AWS_REGION }}

      - name: "[3] Log in to GitHub Container Registry"
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: "[4] Deploy to EC2 via SSM"
        run: |
          REPO_URL="ghcr.io/${{ github.repository }}"

          COMMANDS="[ 
            \"echo '${{ secrets.GHCR_PAT }}' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin\",
            \"docker pull $REPO_URL:latest\",
            \"docker stop basic-be || true\",
            \"docker rm basic-be || true\",
            \"docker run -d --name basic-be -p 8080:8080 $REPO_URL:latest\",
            \"docker ps\"
          ]"

          CMD_ID=$(aws ssm send-command \
            --region ${{ secrets.AWS_REGION }} \
            --document-name "AWS-RunShellScript" \
            --instance-ids ${{ secrets.AWS_SSM_INSTANCE_ID }} \
            --comment "Deploy SpringBoot app via SSM" \
            --parameters commands="$COMMANDS" \
            --query "Command.CommandId" \
            --output text)

          echo "Command sent. Waiting for result..."

          for i in {1..12}; do
            STATUS=$(aws ssm list-command-invocations \
              --region ${{ secrets.AWS_REGION }} \
              --command-id $CMD_ID \
              --details \
              --query "CommandInvocations[0].Status" \
              --output text)

            echo "Status: $STATUS"

            if [ "$STATUS" = "Success" ] || [ "$STATUS" = "Failed" ]; then
              break
            fi
            sleep 5
          done

          echo "Command Output:"
          aws ssm list-command-invocations \
            --region ${{ secrets.AWS_REGION }} \
            --command-id $CMD_ID \
            --details \
            --query "CommandInvocations[0].CommandPlugins[0].Output" \
            --output text
