server:
  port: 8080
spring:
  application:
    name: basic
  profiles:
    active: prod

  # 정적 파일 설정
  mvc:
    static-path-pattern: /**

  # 뷰템플릿 설정 (Thymeleaf)
  thymeleaf:
    enabled: true
    mode: HTML
    encoding: UTF-8
    cache: false
    check-template-location: true

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.springframework.security: INFO
    # org.springframework.boot.autoconfigure: DEBUG

jwt:
  private:
    key: classpath:jwt/app.key
  public:
    key: classpath:jwt/app.pub
