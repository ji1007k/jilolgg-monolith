name: "[CI] PR Test & Build"

on:
  pull_request:
    branches:
      - main  # PR 요청 시 실행
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  verify:
    name: "[CI] Gradle Test & Build Verification"
    runs-on: ubuntu-22.04

    steps:
      - name: "[1] 저장소 코드 다운로드 (Checkout)"
        uses: actions/checkout@v4

      - name: "[2] JDK 17 설정"
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: "[3] Node.js 설정"
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: "[4] 백엔드 테스트/빌드 검증"
        run: ./gradlew test build -x buildFrontend

      - name: "[5] 프론트 빌드 검증"
        run: |
          ./gradlew buildFrontend

