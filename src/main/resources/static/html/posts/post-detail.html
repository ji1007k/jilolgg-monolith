<!-- ================================
    게시글 상세 페이지
================================ -->
<div class="post-container" th:if="${post}">
    <h1 class="post-title" th:text="${post.title}"></h1>
    <div class="post-info">
        <span>작성자: <b th:text="${post.author}"></b></span>
        <span>작성일: <b th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}"></b></span>
    </div>
    <p class="post-content" th:text="${post.content}"></p>

    <!-- 좋아요 버튼 -->
    <button class="like-btn" onclick="likePost()" th:data-post-id="${post.id}">
        <i class="fas fa-thumbs-up"></i> 좋아요 <span th:text="${post.likes}"></span>
    </button>

    <!-- 댓글 섹션 -->
    <section class="comments-container">
        <h2>댓글</h2>

        <!-- 댓글 입력 폼 -->
        <div class="comment-input-container">
            <textarea id="commentContent" placeholder="댓글을 입력하세요..."></textarea>
            <button onclick="submitComment()">댓글 작성</button>
        </div>

        <!-- 댓글 목록 -->
        <div th:each="comment : ${post.comments}" class="comment-box">
            <div class="comment-header">
                <span th:text="${comment.author}"></span>
                <span th:text="${#temporals.format(comment.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
            </div>
            <p class="comment-content" th:text="${comment.content}"></p>

            <!-- 대댓글 버튼 -->
            <span class="reply-btn" onclick="showReplyForm(this)">답글</span>

            <!-- 대댓글 입력 폼 -->
            <div class="comment-input-container reply-container" style="display: none;">
                <textarea placeholder="답글을 입력하세요..."></textarea>
                <button onclick="submitReply()">답글 작성</button>
            </div>

            <!-- 대댓글 목록 -->
            <div th:each="reply : ${comment.replies}" class="reply-container">
                <div class="comment-box">
                    <div class="comment-header">
                        <span th:text="${reply.author}"></span>
                        <span th:text="${#temporals.format(reply.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
                    </div>
                    <p class="comment-content" th:text="${reply.content}"></p>
                </div>
            </div>
        </div>
    </section>
</div>
