spring:
  application:
    name: basic-test

  # 정적 파일 설정
  mvc:
    static-path-pattern: /**

  # Database (H2 in-memory)
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # 테스트 데이터 자동 로드 설정
  sql:
    init:
      mode: always
      encoding: UTF-8

  # Hibernate & JPA 설정
  jpa:
    # 사용할 데이터베이스의 Hibernate Dialect 설정 (H2 데이터베이스 사용)
    database-platform: org.hibernate.dialect.H2Dialect
    # DDL 자동 생성 및 삭제 설정 (앱 실행 시 테이블 생성, 종료 시 삭제)
    hibernate:
      ddl-auto: create-drop
    # 애플리케이션 실행 후 데이터 소스 초기화 지연 (SQL 스크립트 실행이 필요할 때 사용)
    defer-datasource-initialization: true
    # 실행된 SQL 쿼리를 보기 좋게 정렬 (들여쓰기)
    properties:
      hibernate:
        format_sql: true
        # SQL 실행 시 주석을 포함해서 출력 (JPQL → SQL 변환 과정 포함)
        use_sql_comments: true
        # 테이블 및 컬럼 이름을 따옴표로 감싸지 않도록 설정 (DBMS에 따라 동작 방식이 달라질 수 있음)
        globally_quoted_identifiers: true

  # Spring Batch 설정
  batch:
    jdbc:
      # spring-batch-core-*.jar 안에 있는 DDL 스크립트를 DB에 실행. 내장 DB(H2 등)일 때만 자동 생성
      initialize-schema: embedded
    job:
      # 스프링 컨텍스트에 등록된 첫 번째 Job 자동 실행x
      enabled: false

# logging 설정
logging:
  config: classpath:logback-spring.xml
  level:
    # Hibernate의 SQL 실행 로그를 출력 (DEBUG 레벨)
    org.hibernate.SQL: DEBUG
    # SQL 바인딩된 값(파라미터 값)까지 출력 (TRACE 레벨)
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

jwt:
  private:
    key: classpath:jwt/app.key
  public:
    key: classpath:jwt/app.pub

uploads:
  path: uploads/

