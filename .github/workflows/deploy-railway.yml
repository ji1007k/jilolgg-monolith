name: "[CD] Deploy BasicBE SpringBoot via SSM & Rollback"

on:
  push:
    branches:
      - main    # main 브랜치에 푸시될 때마다 실행됨

permissions:
  id-token: write   # OIDC 인증을 위해 필요
  contents: read    # 레포 접근 위해 필요

jobs:
  deployBasicBeSpringBoot:
    runs-on: ubuntu-latest

    steps:
      - name: "[1] Checkout repository"
        uses: actions/checkout@v4

      - name: "[2] Log in to GitHub Container Registry (for Pull)"
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.RAILWAY_GHCR_PAT }}

      # Railway 배포 트리거 (GraphQL API 사용)
      - name: "[3] Trigger Railway Deployment via GraphQL"
        run: |
          echo "Railway GraphQL 배포 트리거 호출 시작..."
          
          # 셸 변수를 안전하게 선언 및 사용
          RAILWAY_API_TOKEN="${{ secrets.RAILWAY_API_TOKEN }}"
          RAILWAY_PROJECT_ID="${{ secrets.RAILWAY_PROJECT_ID }}"
          RAILWAY_SERVICE_ID="${{ secrets.RAILWAY_SERVICE_ID }}"
          
          # GraphQL Mutation 호출 (배포 트리거) - Railway에게 새 배포를 시작하라고 알림
          curl -X POST \
            -H "Authorization: Bearer $RAILWAY_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query": "mutation { deploymentTrigger(serviceId: \"'$RAILWAY_SERVICE_ID'\") }"}' \
            "https://api.railway.app/graphql"
          
          echo "Railway 배포 트리거 요청 완료."
          
