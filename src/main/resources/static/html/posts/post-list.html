<div class="board-container">
    <!-- 게시판 제목 -->
    <h1>게시판</h1>

    <!-- 게시글 검색 영역 -->
    <div class="board-search">
        <select name="category" id="category">
            <option value="">전체 카테고리</option>
            <option th:each="category : ${categories}" th:value="${category}" th:text="${category}"></option>
        </select>
        <input type="text" id="searchKeyword" placeholder="제목 또는 내용을 입력하세요" th:value="${keyword}">
        <button onclick="searchPosts()">검색</button>
    </div>

    <!-- 게시글 목록 -->
    <table class="board-table">
        <thead>
        <tr>
            <th>번호</th>
            <th>제목</th>
            <th>작성자</th>
            <th>작성일</th>
            <th>조회수</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="post : ${posts}">
            <td th:text="${post.id}"></td>
            <td>
                <a th:href="@{/post/{id}(id=${post.id})}" th:text="${post.title}"></a>
            </td>
            <td th:text="${post.author}"></td>
            <td th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
            <td th:text="${post.views}"></td>
        </tr>
        </tbody>
    </table>

    <!-- 글 작성 버튼 -->
    <div style="text-align: right; margin-top: 20px;">
        <a th:href="@{/post/write}" class="write-btn">글 작성</a>
    </div>
</div>
