# Database (PostgreSQL)
spring.datasource.url=jdbc:postgresql://db-postgresql.ctqgk0k2w472.ap-northeast-2.rds.amazonaws.com:5432/basic?sslmode=require
spring.datasource.username=postgres
spring.datasource.password=postgres250425
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Spring Boot SQL 설정
# schema.sql, data.sql 파일은 애플리케이션 시작 시 실행할 SQL 스크립트를 지정합니다.
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:/db/postgres/schema.sql
spring.sql.init.data-locations=classpath:/db/postgres/data.sql

# SQL 출력 설정 (쿼리 로그 보기)
# spring.jpa.show-sql=true  # 쿼리 로그 출력
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Swagger UI 설정
# API 문서 (JSON 형태) 활성화
springdoc.api-docs.enabled=true
# Swagger UI 활성화
springdoc.swagger-ui.enabled=true
# Swagger UI 경로 설정
springdoc.swagger-ui.path=/api/swagger-ui
# API Docs URL 설정 (기본값: /v3/api-docs -> /v3/api-docs)
springdoc.api-docs.path=/api/v3/api-docs
# Swagger UI 기본 URL 비활성화
springdoc.swagger-ui.disable-swagger-default-url=true
# API 문서 메서드 순서 설정 (alpha: 알파벳 순)
springdoc.swagger-ui.operations-sorter=alpha
# Swagger UI에서 Try it out 기능 활성화
springdoc.swagger-ui.try-it-out-enabled=true
# API Docs 그룹 활성화 (OpenAPI에 그룹화된 API가 있다면 사용)
springdoc.api-docs.groups.enabled=true
# Swagger UI 모델 깊이 설정
springdoc.swagger-ui.default-model-expand-depth=1
springdoc.swagger-ui.default-models-expand-depth=1
springdoc.swagger-ui.csrf.enabled=true
springdoc.swagger-ui.with-credentials=true

