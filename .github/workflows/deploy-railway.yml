name: "[CD] Deploy JILoL.gg SpringBoot to Railway"

on:
  # CI 이미지 빌드 완료 후에만 Railway 배포 트리거
  workflow_run:
    workflows:
      - "[CI] Build & Push Monolith App (Next.js + Spring Boot)"
    types:
      - completed

jobs:
  deployBasicBeSpringBoot:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest

    steps:
      # [1] 이미지가 이미 GHCR에 있다는 가정하에, 별도의 빌드/체크아웃 생략
      # [2] Railway CLI 설치 (매번 설치해서 사용. 최신 버전 유지)
      - name: Install Railway CLI
        run: npm install -g @railway/cli

      # [3] CLI를 이용한 배포 트리거
      - name: Trigger Railway Redeploy
        run: |
          railway redeploy \
            --service "${{ secrets.RAILWAY_SERVICE_ID }}" \
            -y
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_PROJECT_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_ENVIRONMENT_ID: ${{ secrets.RAILWAY_ENV_ID }}
