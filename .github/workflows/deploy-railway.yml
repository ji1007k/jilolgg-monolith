name: "[CD] Deploy BasicBE SpringBoot via SSM & Rollback"

on:
  push:
    branches:
      - main    # main 브랜치에 푸시될 때마다 실행됨

jobs:
  deployBasicBeSpringBoot:
    runs-on: ubuntu-latest

    steps:
      # [1] 이미지가 이미 GHCR에 있다는 가정하에, 별도의 빌드/체크아웃 생략
      # [2] Railway CLI 설치 (매번 설치해서 사용. 최신 버전 유지)
      - name: Install Railway CLI
        run: npm install -g @railway/cli

      # [3] CLI를 이용한 배포 트리거
      # --service와 --environment 옵션을 사용하여 명시적으로 타겟 지정
      - name: Trigger Railway Redeploy
        run: |
          railway redeploy \
            --project "${{ secrets.RAILWAY_PROJECT_ID }}" \
            --service "${{ secrets.RAILWAY_SERVICE_ID }}" \
            -y
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          
