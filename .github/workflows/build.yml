name: "[CI] Build & Push Monolith App (Next.js + Spring Boot)"

on:
  # push:
  #   branches:
  #     - main  # main 브랜치에 직접 커밋/푸시될 때 실행
  pull_request:
    branches:
      - main  # PR 요청 시 실행
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: "[CI] Monolith Image Build & Push to GHCR"
    runs-on: ubuntu-22.04

    steps:
      - name: "[1] 저장소 코드 다운로드 (Checkout)"
        uses: actions/checkout@v4

      - name: "[2] Docker Buildx 설정"
        uses: docker/setup-buildx-action@v2
        with:
          version: latest

      - name: "[3] GitHub Container Registry(GHCR) 로그인"
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: "[4] 도커 이미지 URL 환경 변수 등록"
        run: echo "REPO_URL=ghcr.io/${{ github.repository }}" >> $GITHUB_ENV
        
      - name: "[5] 모놀리식 앱 통합 빌드 및 GHCR 푸시"
        run: |
          # 프론트엔드(Next.js)와 백엔드(Spring Boot)가 통합된 서버 이미지를 빌드합니다.
          # Dockerfile 내부에서 Node.js 설치 및 Gradle 빌드가 함께 이뤄집니다.
          docker build -t $REPO_URL:latest .
          docker push $REPO_URL:latest



