# Database (PostgreSQL)
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.url=jdbc:postgresql://localhost:5432/basic
spring.datasource.username=jikim
spring.datasource.password=jikim

# Spring Boot SQL 설정
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:/db/postgres/schema.sql
spring.sql.init.data-locations=classpath:/db/postgres/data.sql

# SQL 출력 설정
spring.jpa.properties.hibernate.use_sql_comments=true

# Spring Batch 설정
spring.batch.jdbc.initialize-schema=always
spring.batch.job.enabled=false

# HTTPS 설정 (pem 방식. 로컬 개발용)
server.port=8080
server.ssl.enabled=false

# Swagger UI 설정
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/api/swagger-ui
springdoc.api-docs.path=/api/v3/api-docs
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true

# Redis 설정
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.timeout=2000

# Redisson
logging.level.org.redisson=debug

# 쿠키 보안 옵션
# 로컬 개발(HTTP) 시에는 false로 설정해야 브라우저가 쿠키를 보냄 (매우 중요)
cookie.secure=false
# SameSite: Lax (통합 배포 시 같은 도메인이므로 Lax가 적합)
cookie.same-site=Lax